{% extends 'bookmarks/base.html' %}
{% block content %}

    <div class="w-full max-w-md bg-gray-900 p-8 rounded-2xl shadow-lg text-center">

        <h2 class="text-2xl font-bold mb-4">Logged Out</h2>

        <p class="text-gray-400 mb-6">

    </div>

</div>
{% endblock %}
