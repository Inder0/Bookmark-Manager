{% extends 'bookmarks/base.html' %}

{% block content %}

<div class="max-w-6xl mx-auto mt-10 px-4">
    <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8"></div>

    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 mb-10">
        <h2 class="text-lg font-semibold mb-1">Add Bookmark</h2>
        <p class="text-sm text-gray-400 mb-4">
            Save a link with name. We'll fetch the rest.
        </p>

        <div id="add-form">
            {% include "bookmarks/partials/add_form.html" %}
        </div>
    </div>

        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-4 gap-3">
        <h2 class="text-lg font-semibold">Your Bookmarks</h2>
        <input 
            type="text"
            name="q"
            value="{{query}}"
            placeholder="Search..."
            class="w-full sm:w-72 bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 text-white"

            hx-get="{% url 'bookmarks:home' %}"
            hx-trigger="keyup changed delay:300ms"
            hx-target="#bookmark-list"
            hx-swap="innerHTML"
            hx-push-url="true"
        />
    </div>
    <div id="bookmark-list">
        {% include "bookmarks/partials/bookmark_list.html" %}
    </div>
</div>

{% endblock %}
