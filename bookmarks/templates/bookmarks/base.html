<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com?plugins=line-clamp"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <title>{% block title %}Bookmark Manager{% endblock %}</title>
</head>

<body class="bg-gray-950 text-gray-100 min-h-screen">

    <nav class="border-b border-gray-800 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">

            <a href="{% url 'bookmarks:home' %}" class="text-lg font-semibold">
                Bookmark Manager
            </a>

            {% if user.is_authenticated %}
            <a href="{% url 'logout' %}" 
               class="border border-gray-700 px-4 py-1 rounded-md hover:bg-gray-800 text-sm">
                Logout
            </a>
            {% endif %}

        </div>
    </nav>

    {% if messages %}
    <div class="max-w-4xl mx-auto mt-6 px-4">
        {% for message in messages %}
            <div class="px-4 py-3 mb-3 rounded-lg bg-gray-800 text-sm border border-gray-700">
                {{ message }}
            </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="pb-10">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
